<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Release Tracker - VHQ Music</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            padding: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .auto-update-status {
            background: #e3f2fd;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #1976d2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            position: relative;
        }
        
        .pulse-dot::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        
        .checking .pulse-dot {
            background: #ff9800;
        }
        
        .checking .pulse-dot::before {
            background: #ff9800;
        }
        
        .last-check {
            color: #666;
            font-size: 11px;
        }
        
        .new-tracks-badge {
            background: #ff5722;
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 10px;
            animation: bounce 1s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        
        @media (min-width: 768px) {
            .projects-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }
        }
        
        @media (min-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }
        
        @media (min-width: 1400px) {
            .projects-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .project-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 12px;
            display: flex;
            flex-direction: column;
        }
        
        .project-image {
            width: 100%;
            height: 100px;
            object-fit: cover;
            background: #f0f0f0;
        }
        
        .project-header {
            padding: 8px;
            background: #f8f9fa;
            border-bottom: 2px solid #667eea;
        }
        
        .project-header h2 {
            color: #333;
            font-size: 14px;
            margin-bottom: 3px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .artist-links {
            margin: 5px 0;
            font-size: 10px;
        }
        
        .artist-links a {
            color: #1976d2;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: #e3f2fd;
            padding: 2px 6px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        
        .artist-links a:hover {
            background: #bbdefb;
        }
        
        .release-days {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }
        
        .release-days span {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 4px;
            border-radius: 8px;
            margin-right: 3px;
            margin-bottom: 3px;
            font-size: 9px;
        }
        
        .last-releases {
            background: #e3f2fd;
            padding: 6px;
            border-radius: 6px;
            margin: 6px 0 8px 0;
            font-size: 11px;
            border-left: 3px solid #2196f3;
        }
        
        .last-releases-title {
            font-weight: bold;
            color: #1976d2;
            margin-bottom: 4px;
            font-size: 11px;
        }
        
        .last-release-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px dashed #b8daff;
            font-size: 10px;
        }
        
        .release-day-badge {
            display: inline-block;
            padding: 1px 4px;
            border-radius: 8px;
            background: #1976d2;
            color: white;
            font-size: 8px;
            margin-left: 4px;
        }
        
        .signals-container {
            margin: 8px 0;
            padding: 0 8px;
        }
        
        .next-track-signal {
            padding: 6px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 11px;
        }
        
        .signal-green {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .signal-yellow {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }
        
        .signal-orange {
            background: #ffd8b2;
            border: 1px solid #ffb77c;
            color: #b24d00;
        }
        
        .signal-red {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .signal-title {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .signal-day {
            display: inline-block;
            padding: 1px 4px;
            border-radius: 8px;
            background: rgba(0,0,0,0.1);
            font-size: 9px;
        }
        
        .signal-deadline {
            font-size: 13px;
            font-weight: bold;
            margin: 4px 0;
            text-align: center;
        }
        
        .form-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        
        .form-section h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 10px;
        }
        
        label {
            font-size: 12px;
            margin-bottom: 3px;
            display: block;
        }
        
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
        }
        
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 3px;
            min-width: 45px;
            font-size: 11px;
        }
        
        .checkbox-item input {
            width: auto;
            margin-right: 2px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
        }
        
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        
        .mobile-add-btn {
            display: none;
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            font-size: 24px;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        
        @media (max-width: 480px) {
            .mobile-add-btn {
                display: flex;
            }
            .form-section {
                display: block;
            }
        }
        
        .section-divider {
            text-align: center;
            margin: 20px 0 15px;
            color: white;
            font-size: 16px;
        }
        .section-divider::before,
        .section-divider::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 2px;
            background: rgba(255,255,255,0.5);
            margin: 0 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxeWNqZmNqdGRhd3lyeXNncmJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MDE5NzAsImV4cCI6MjA4MjE3Nzk3MH0.LEOUMFAd1cz_1e4uawJcaZLPCMqAQHEWM52Oy7fDjsE';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allowedProjects = JSON.parse(localStorage.getItem('allowedProjects')) || [
            'Placcebo Beats', 'PLENUM', 'Мир детства', 'Звёздная ночь', 'Дом Медитации',
            'Sergey Ryabov', 'Romano Lunario', 'IVASHKOV', 'Гр. ОКРАИНА', 'LOGUNOVA', 
            'Nina Vey', 'FLARIX', 'Маленькие чудеса'
        ];

        const YANDEX_MUSIC_LINKS = {
            'Placcebo Beats': 'https://music.yandex.ru/artist/5087681',
            'PLENUM': 'https://music.yandex.ru/artist/21004707',

            'FLARIX': 'https://music.yandex.ru/artist/23899612',

            'Nina Vey': 'https://music.yandex.ru/artist/24535133',
            'Маленькие чудеса': 'https://music.yandex.ru/artist/25016291'
        };

        const GOOGLE_SHEETS_CONFIG = {
            sheetId: '11gCU7DVGgweld9A-jeo2F2rBh13MVxyQSz1DGb3EVYs',
            sheetName: 'Ответы на форму (1)',
            apiKey: 'AIzaSyB-QjJoeojwGFrzgPOnceY8HfeoB0-7Y_w',
            projectNameColumnIndex: 2,
            releaseDateColumnIndex: 9,
            allowedProjects: allowedProjects
        };

        let selectedProjectId = null;
        const BUFFER_DAYS = 17.5;
        const DAYS_FULL = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
        
        let autoUpdateTimer = null;
        let isChecking = false;
        let lastCheckTime = new Date();
        let projectsCache = null;
        let releasesCache = new Map();

        function log(...args) {
            console.log(...args);
        }

        document.addEventListener('DOMContentLoaded', function() {
            startApp();
        });

        async function startApp() {
            await createInitialProjects();
            await loadAllProjects();
            startAutoUpdate();
            updateLastCheckTime();
            setInterval(updateLastCheckTime, 1000);
            // Принудительная проверка через 1 секунду после загрузки
            setTimeout(() => checkForNewTracks(), 1000);
        }

        function startAutoUpdate() {
            if (autoUpdateTimer) clearInterval(autoUpdateTimer);
            // Ускоренный интервал - каждые 3 секунды, чтобы информация приходила мгновенно
            autoUpdateTimer = setInterval(() => {
                checkForNewTracks();
            }, 3000);
            log('✅ Автообновление запущено с интервалом 3 секунды');
        }

        async function checkForNewTracks() {
            if (isChecking) {
                log('⏳ Проверка уже выполняется, пропускаем...');
                return;
            }
            
            isChecking = true;
            
            try {
                const statusElement = document.getElementById('autoUpdateStatus');
                if (statusElement) statusElement.classList.add('checking');
                
                log('🔍 Проверка новых треков...');
                
                const range = encodeURIComponent(`${GOOGLE_SHEETS_CONFIG.sheetName}!A2:J1000`);
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SHEETS_CONFIG.sheetId}/values/${range}?key=${GOOGLE_SHEETS_CONFIG.apiKey}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Ошибка загрузки: ${response.status}`);
                
                const data = await response.json();
                const googleRows = data.values || [];
                
                const { data: projects } = await supabaseClient.from('projects').select('id, name');
                if (!projects || projects.length === 0) return;
                
                const projectMap = new Map();
                projects.forEach(p => projectMap.set(p.name, p.id));
                
                const projectIds = Array.from(projectMap.values());
                const { data: existingReleases } = await supabaseClient.from('releases').select('track_name, release_date, project_id').in('project_id', projectIds);
                
                const existingTracks = new Set();
                existingReleases?.forEach(r => {
                    const normalizedDate = new Date(r.release_date).toISOString().split('T')[0];
                    existingTracks.add(`${r.project_id}_${r.track_name}_${normalizedDate}`);
                });
                
                const newReleases = [];
                
                for (const row of googleRows) {
                    if (row.length <= GOOGLE_SHEETS_CONFIG.projectNameColumnIndex) continue;
                    if (row.length <= GOOGLE_SHEETS_CONFIG.releaseDateColumnIndex) continue;
                    
                    const fullTitle = row[GOOGLE_SHEETS_CONFIG.projectNameColumnIndex]?.trim();
                    const dateStr = row[GOOGLE_SHEETS_CONFIG.releaseDateColumnIndex]?.trim();
                    
                    if (!fullTitle || !dateStr) continue;
                    
                    const separatorIndex = fullTitle.indexOf(' - ');
                    if (separatorIndex === -1) continue;
                    
                    const projectNameFromSheet = fullTitle.substring(0, separatorIndex).trim();
                    const trackName = fullTitle.substring(separatorIndex + 3).trim();
                    
                    if (!projectNameFromSheet || !trackName) continue;
                    if (!GOOGLE_SHEETS_CONFIG.allowedProjects.includes(projectNameFromSheet)) continue;
                    
                    const projectId = projectMap.get(projectNameFromSheet);
                    if (!projectId) continue;
                    
                    let normalizedDateStr;
                    try {
                        const cleanDateStr = dateStr.split(/[\s\t]/)[0].trim();
                        const dateParts = cleanDateStr.split('.');
                        if (dateParts.length === 3) {
                            const year = dateParts[2];
                            const month = dateParts[1].padStart(2, '0');
                            const day = dateParts[0].padStart(2, '0');
                            normalizedDateStr = `${year}-${month}-${day}`;
                        } else {
                            continue;
                        }
                    } catch (e) {
                        continue;
                    }
                    
                    const trackKey = `${projectId}_${trackName}_${normalizedDateStr}`;
                    
                    if (!existingTracks.has(trackKey)) {
                        newReleases.push({
                            project_id: projectId,
                            track_name: trackName,
                            release_date: normalizedDateStr
                        });
                    }
                }
                
                if (newReleases.length > 0) {
                    log(`➕ Найдено новых треков: ${newReleases.length}`);
                    for (const release of newReleases) {
                        const { error } = await supabaseClient.from('releases').insert([release]);
                        if (!error) {
                            log(`✅ Добавлен: ${release.track_name}`);
                        }
                    }
                    
                    // Полностью перезагружаем кэш и обновляем все карточки
                    releasesCache.clear();
                    await loadAllProjects(); // Полная перезагрузка гарантирует актуальность
                    
                    const badge = document.getElementById('newTracksBadge');
                    if (badge) {
                        badge.style.display = 'inline-block';
                        badge.textContent = `🎵 +${newReleases.length}`;
                        setTimeout(() => { 
                            if (badge) badge.style.display = 'none'; 
                        }, 3000);
                    }
                }
                
                lastCheckTime = new Date();
                
            } catch (error) {
                console.error('❌ Ошибка:', error);
            } finally {
                isChecking = false;
                const statusElement = document.getElementById('autoUpdateStatus');
                if (statusElement) statusElement.classList.remove('checking');
            }
        }
        
        async function updateProjectsData(updatedProjectIds) {
            if (!projectsCache) {
                await loadAllProjects();
                return;
            }
            
            for (const projectId of updatedProjectIds) {
                const { data: releases } = await supabaseClient
                    .from('releases')
                    .select('*')
                    .eq('project_id', projectId)
                    .order('release_date', { ascending: false });
                
                if (releases) {
                    releasesCache.set(projectId, releases);
                }
            }
            
            for (const projectId of updatedProjectIds) {
                const project = projectsCache.find(p => p.id === projectId);
                if (project) {
                    const releases = releasesCache.get(projectId) || [];
                    updateProjectCard(projectId, project, releases);
                }
            }
        }
        
        function updateProjectCard(projectId, project, releases) {
            const card = document.querySelector(`.project-card[data-project-id="${projectId}"]`);
            if (card) {
                const newCard = createProjectCardElement(project, releases);
                newCard.setAttribute('data-project-id', projectId);
                card.parentNode.replaceChild(newCard, card);
            }
        }

        async function createInitialProjects() {
            const { data: projects } = await supabaseClient.from('projects').select('*');
            if (!projects || projects.length === 0) {
                log('Создаем начальные проекты...');
                const initialProjects = [
                    { name: 'Placcebo Beats', image_url: 'https://via.placeholder.com/300x150/667eea/ffffff?text=PB', release_days: [2, 5], yandex_link: YANDEX_MUSIC_LINKS['Placcebo Beats'] },
                    { name: 'PLENUM', image_url: 'https://via.placeholder.com/300x150/764ba2/ffffff?text=PLENUM', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['PLENUM'] },
                    { name: 'Мир детства', image_url: 'https://via.placeholder.com/300x150/28a745/ffffff?text=МД', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Мир детства'] },
                    { name: 'Звёздная ночь', image_url: 'https://via.placeholder.com/300x150/ffc107/000000?text=ЗН', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Звёздная ночь'] },
                    { name: 'Дом Медитации', image_url: 'https://via.placeholder.com/300x150/17a2b8/ffffff?text=ДМ', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Дом Медитации'] },
                    { name: 'Sergey Ryabov', image_url: 'https://via.placeholder.com/300x150/6f42c1/ffffff?text=SR', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Sergey Ryabov'] },
                    { name: 'Romano Lunario', image_url: 'https://via.placeholder.com/300x150/e83e8c/ffffff?text=RL', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Romano Lunario'] },
                    { name: 'IVASHKOV', image_url: 'https://via.placeholder.com/300x150/fd7e14/ffffff?text=IV', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['IVASHKOV'] },
                    { name: 'Гр. ОКРАИНА', image_url: 'https://via.placeholder.com/300x150/20c997/ffffff?text=ГО', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Гр. ОКРАИНА'] },
                    { name: 'LOGUNOVA', image_url: 'https://via.placeholder.com/300x150/007bff/ffffff?text=LG', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['LOGUNOVA'] },
                    { name: 'Nina Vey', image_url: 'https://via.placeholder.com/300x150/dc3545/ffffff?text=NV', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Nina Vey'] },
                    { name: 'FLARIX', image_url: 'https://via.placeholder.com/300x150/6f42c1/ffffff?text=FLARIX', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['FLARIX'] },
                    { name: 'Маленькие чудеса', image_url: 'https://via.placeholder.com/300x150/ff6b6b/ffffff?text=МЧ', release_days: [5], yandex_link: YANDEX_MUSIC_LINKS['Маленькие чудеса'] }
                ];
                for (const project of initialProjects) {
                    await supabaseClient.from('projects').insert([project]);
                }
                log('✅ Начальные проекты созданы');
            } else {
                // Проверяем и обновляем дни для Placcebo Beats, чтобы гарантировать [2,5]
                const pbProject = projects.find(p => p.name === 'Placcebo Beats');
                if (pbProject && (!pbProject.release_days || pbProject.release_days.length !== 2 || !pbProject.release_days.includes(2) || !pbProject.release_days.includes(5))) {
                    log('🔧 Исправляем дни релизов для Placcebo Beats (вторник и пятница)');
                    await supabaseClient.from('projects').update({ release_days: [2, 5] }).eq('id', pbProject.id);
                }
            }
        }
        
        function getLastReleaseForDay(releases, targetDay) {
            if (!releases || releases.length === 0) return null;
            
            const dayReleases = releases
                .filter(r => new Date(r.release_date).getDay() === targetDay)
                .sort((a, b) => new Date(b.release_date) - new Date(a.release_date));
            
            return dayReleases.length > 0 ? dayReleases[0] : null;
        }
        
        function getNextReleaseDate(fromDate, targetDay) {
            const date = new Date(fromDate); 
            date.setHours(0,0,0,0);
            const currentDay = date.getDay();
            let daysToAdd = (targetDay - currentDay + 7) % 7;
            if (daysToAdd === 0) daysToAdd = 7;
            date.setDate(date.getDate() + daysToAdd);
            return date;
        }
        
        function calculateDeadlineForDay(lastReleaseDate, targetDay) {
            if (!lastReleaseDate) return null;
            
            const today = new Date(); 
            today.setHours(0,0,0,0);
            
            const lastRelease = new Date(lastReleaseDate); 
            lastRelease.setHours(0,0,0,0);
            
            const nextReleaseDate = getNextReleaseDate(lastRelease, targetDay);
            const deadlineTimestamp = nextReleaseDate.getTime() - (BUFFER_DAYS * 24 * 60 * 60 * 1000);
            const deadlineForNewTrack = new Date(deadlineTimestamp); 
            deadlineForNewTrack.setHours(0,0,0,0);
            
            const msLeft = deadlineForNewTrack - today;
            const daysLeft = Math.round((msLeft / (1000 * 60 * 60 * 24)) * 2) / 2;
            
            let status = { class: 'signal-green', emoji: '✅', daysLeft: daysLeft };
            
            if (daysLeft < 0) {
                status = { class: 'signal-red', emoji: '🔥', daysLeft: daysLeft };
            } else if (daysLeft <= 3) {
                status = { class: 'signal-red', emoji: '⚠️', daysLeft: daysLeft };
            } else if (daysLeft <= 7) {
                status = { class: 'signal-orange', emoji: '⚠️', daysLeft: daysLeft };
            } else if (daysLeft <= 12) {
                status = { class: 'signal-yellow', emoji: '📝', daysLeft: daysLeft };
            }
            
            return { dayName: DAYS_FULL[targetDay], daysLeft, status };
        }

        async function loadAllProjects() {
            log('🔄 Загрузка всех проектов...');
            
            const { data: projects } = await supabaseClient.from('projects').select('*');
            if (!projects || projects.length === 0) {
                document.getElementById('projectsGrid').innerHTML = '<div style="text-align: center; padding: 50px; color: white;">Нет проектов</div>';
                return;
            }
            
            // Принудительно для Placcebo Beats задаем дни [2,5] если вдруг сбились
            const pbTarget = projects.find(p => p.name === 'Placcebo Beats');
            if (pbTarget && (!pbTarget.release_days || pbTarget.release_days.length !== 2 || !pbTarget.release_days.includes(2) || !pbTarget.release_days.includes(5))) {
                pbTarget.release_days = [2, 5];
                await supabaseClient.from('projects').update({ release_days: [2, 5] }).eq('id', pbTarget.id);
            }
            
            projectsCache = projects;
            
            // Загружаем все релизы для всех проектов
            const { data: allReleases } = await supabaseClient.from('releases').select('*');
            if (allReleases) {
                releasesCache.clear();
                allReleases.forEach(r => {
                    if (!releasesCache.has(r.project_id)) releasesCache.set(r.project_id, []);
                    releasesCache.get(r.project_id).push(r);
                });
                // Сортируем релизы для каждого проекта по дате
                for (let [pid, rels] of releasesCache.entries()) {
                    rels.sort((a, b) => new Date(b.release_date) - new Date(a.release_date));
                }
            }
            
            const fixedOrder = ['Placcebo Beats', 'PLENUM', 'Мир детства', 'Звёздная ночь', 'Дом Медитации'];
            const otherProjects = projects.filter(p => !fixedOrder.includes(p.name));
            
            const sortedOthers = await Promise.all(otherProjects.map(async (project) => {
                const releases = releasesCache.get(project.id) || [];
                let minDays = Infinity;
                if (releases?.length) {
                    const days = project.release_days?.length ? project.release_days : [5];
                    days.forEach(day => {
                        const last = getLastReleaseForDay(releases, day);
                        if (last) {
                            const info = calculateDeadlineForDay(last.release_date, day);
                            if (info && info.daysLeft < minDays) minDays = info.daysLeft;
                        }
                    });
                }
                return { project, minDays };
            }));
            
            sortedOthers.sort((a, b) => a.minDays - b.minDays);
            
            const finalProjects = [];
            fixedOrder.forEach(name => {
                const p = projects.find(p => p.name === name);
                if (p) finalProjects.push(p);
            });
            sortedOthers.forEach(item => finalProjects.push(item.project));
            
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';
            
            for (const project of finalProjects) {
                const releases = releasesCache.get(project.id) || [];
                const card = createProjectCardElement(project, releases);
                card.setAttribute('data-project-id', project.id);
                grid.appendChild(card);
            }
            
            log('✅ Загрузка проектов завершена');
        }

        function createProjectCardElement(project, releases) {
            const card = document.createElement('div'); 
            card.className = 'project-card';
            
            let imageHtml = '<div class="project-image" style="background:#ddd;display:flex;align-items:center;justify-content:center;">📷</div>';
            if (project.image_url) imageHtml = `<img src="${project.image_url}" class="project-image" onerror="this.src='https://via.placeholder.com/300x150/cccccc/ffffff?text=No+Image'">`;

            let yandexLinkHtml = '';
            const yandexLink = project.yandex_link || YANDEX_MUSIC_LINKS[project.name];
            if (yandexLink) {
                yandexLinkHtml = `<div class="artist-links"><a href="${yandexLink}" target="_blank" rel="noopener noreferrer">🎵 Яндекс Музыка</a></div>`;
            }

            let releaseDays = project.release_days?.length ? project.release_days : [5];
            // Для Placcebo Beats жестко задаем оба дня для отображения
            if (project.name === 'Placcebo Beats') {
                releaseDays = [2, 5];
            }
            let releaseDaysHtml = `<div class="release-days"><span>${releaseDays.map(d => DAYS_FULL[d]).join(' ')}</span></div>`;

            let lastReleasesHtml = ''; 
            const lastReleasesByDay = [];
            
            releaseDays.forEach(day => { 
                const last = getLastReleaseForDay(releases, day); 
                if (last) lastReleasesByDay.push({ dayName: DAYS_FULL[day], release: last }); 
            });
            
            if (lastReleasesByDay.length) {
                lastReleasesHtml = '<div class="last-releases"><div class="last-releases-title">📀 Последние релизы</div>';
                lastReleasesByDay.slice(0,2).forEach(item => { 
                    lastReleasesHtml += `<div class="last-release-item">
                        <span>${escapeHtml(item.release.track_name).substring(0,12)}${escapeHtml(item.release.track_name).length>12?'...':''}<span class="release-day-badge">${item.dayName}</span></span>
                        <span>${formatDate(item.release.release_date)}</span>
                    </div>`; 
                });
                lastReleasesHtml += '</div>';
            }

            let signalsHtml = '<div class="signals-container">';
            // Показываем сигналы для всех дней релизов (для Placcebo Beats оба дня)
            releaseDays.forEach(day => {
                const last = getLastReleaseForDay(releases, day);
                if (last) {
                    const info = calculateDeadlineForDay(last.release_date, day);
                    if (info) {
                        const daysDisplay = info.daysLeft % 1 === 0 ? info.daysLeft : info.daysLeft.toFixed(1);
                        signalsHtml += `
                            <div class="next-track-signal ${info.status.class}">
                                <div class="signal-title">${info.status.emoji} <span class="signal-day">${info.dayName}</span></div>
                                <div class="signal-deadline">${info.daysLeft < 0 ? '🔥' : daysDisplay + 'д'}</div>
                            </div>
                        `;
                    }
                } else {
                    // Если нет последнего релиза для этого дня, показываем нейтральный сигнал
                    signalsHtml += `
                        <div class="next-track-signal signal-yellow">
                            <div class="signal-title">📅 <span class="signal-day">${DAYS_FULL[day]}</span></div>
                            <div class="signal-deadline">нет данных</div>
                        </div>
                    `;
                }
            });
            signalsHtml += '</div>';

            card.innerHTML = `${imageHtml}<div class="project-header">
                <h2>${escapeHtml(project.name)}</h2>
                ${yandexLinkHtml}
                ${releaseDaysHtml}
                ${lastReleasesHtml}
                ${signalsHtml}
            </div>`;
            return card;
        }

        function formatDate(date) { 
            const d = new Date(date); 
            return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' }); 
        }
        
        function escapeHtml(text) { 
            const div = document.createElement('div'); 
            div.textContent = text; 
            return div.innerHTML; 
        }
        
        function updateLastCheckTime() {
            const now = new Date();
            const diff = Math.floor((now - lastCheckTime) / 1000);
            let timeText = 'ожидание...';
            if (diff <= 3) {
                timeText = 'только что';
            } else if (diff < 60) {
                timeText = `${diff}с назад`;
            } else {
                timeText = `${Math.floor(diff / 60)}м назад`;
            }
            const timeElement = document.getElementById('lastUpdateTime');
            if (timeElement) timeElement.innerHTML = `⏱️ ${timeText}`;
        }

        window.openReleaseModal = function(projectId) { 
            selectedProjectId = projectId; 
            document.getElementById('releaseModal').style.display = 'flex'; 
            document.getElementById('trackName').value = '';
            document.getElementById('releaseDate').value = '';
        };
        
        window.closeModal = function() { 
            document.getElementById('releaseModal').style.display = 'none'; 
            selectedProjectId = null; 
        };
        
        window.addProject = async function() {
            const name = document.getElementById('projectName').value.trim(); 
            const image = document.getElementById('projectImage').value.trim();
            const yandexLink = document.getElementById('projectYandexLink').value.trim();
            const releaseDays = [];
            
            if (document.getElementById('dayMon').checked) releaseDays.push(1);
            if (document.getElementById('dayTue').checked) releaseDays.push(2);
            if (document.getElementById('dayWed').checked) releaseDays.push(3);
            if (document.getElementById('dayThu').checked) releaseDays.push(4);
            if (document.getElementById('dayFri').checked) releaseDays.push(5);
            if (document.getElementById('daySat').checked) releaseDays.push(6);
            if (document.getElementById('daySun').checked) releaseDays.push(0);
            
            if (!name) { alert('Введите название'); return; }
            if (releaseDays.length === 0) { alert('Выберите дни'); return; }
            
            const { error } = await supabaseClient.from('projects').insert([{ 
                name, 
                image_url: image || null, 
                release_days: releaseDays,
                yandex_link: yandexLink || null
            }]);
            
            if (error) {
                console.error('Ошибка при добавлении проекта:', error);
                alert('Ошибка при добавлении проекта');
                return;
            }
            
            if (!GOOGLE_SHEETS_CONFIG.allowedProjects.includes(name)) {
                GOOGLE_SHEETS_CONFIG.allowedProjects.push(name);
                localStorage.setItem('allowedProjects', JSON.stringify(GOOGLE_SHEETS_CONFIG.allowedProjects));
            }
            
            document.getElementById('projectName').value = ''; 
            document.getElementById('projectImage').value = '';
            document.getElementById('projectYandexLink').value = '';
            document.querySelectorAll('#projectForm input[type="checkbox"]').forEach(cb => cb.checked = false);
            
            releasesCache.clear();
            await loadAllProjects();
            alert(`Проект "${name}" успешно добавлен`);
        };
        
        window.addRelease = async function() {
            const track = document.getElementById('trackName').value.trim(); 
            const date = document.getElementById('releaseDate').value;
            
            if (!track || !date) { alert('Заполните поля'); return; }
            if (!selectedProjectId) { alert('Ошибка'); return; }
            
            await supabaseClient.from('releases').insert([{ 
                project_id: selectedProjectId, 
                track_name: track, 
                release_date: date 
            }]);
            
            releasesCache.delete(selectedProjectId);
            closeModal(); 
            await loadAllProjects();
        };
        
        window.toggleForm = function() { 
            const form = document.getElementById('projectForm'); 
            form.style.display = form.style.display === 'none' ? 'block' : 'none'; 
        };
        
        window.onclick = function(event) { 
            const modal = document.getElementById('releaseModal'); 
            if (event.target === modal) closeModal(); 
        };
    </script>
